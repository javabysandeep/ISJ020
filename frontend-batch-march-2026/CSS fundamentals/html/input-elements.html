<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form </title>
</head>
<body>
     <h3>Send us a Message</h3>
    <table>
        <form action="https://itshaala.com" method="get">
            <tr>
                <td>First Name</td>
                <td><input type="text" name="fname" /> </td>
            </tr>

            <tr>
                <td>Last Name</td>
                <td><input type="text" name="lname" /> </td>
            </tr>
            <tr>
                <td>Email</td>
                <td><input type="email" name="email" required/> </td>
            </tr>
            <tr>
                <td>Phone</td>
                <td><input type="number" name="phone" required/> </td>
            </tr>
            <tr>
                <td>Course Interested</td>
                <td><input type="text" name="interest" /> </td>
            </tr>
            <tr>
                <td>Message</td>
                <td><input type="text" name="message" /> </td>
            </tr>
            <tr>
                <td>I aceept the terms & conditions</td>
                <td><input type="checkbox" name="terms" /> </td>
            </tr>

             <tr>
                <td>Gender</td>
                <td><input type="radio" name="gender"/>
                        Male
                      
                        <input type="radio" name="gender" />
                        Female
                    
                    </td>
                </td>
            </tr>
            <tr>
                <td>Course Interested</td>
                <td>
                    <select>
                        <option value="fsj">Full Stack Java</option>
                        <option value="fsp">Full Stack Python</option>
                        <option value="fsmr">Full Stack MERN</option>
                        <option value="da">Data Analytics</option>
                        <option value="ds">Data Science</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td> <input type="submit" value="Send Message" /></td>
            </tr>
        </form>
    </table>

</body>
</html>

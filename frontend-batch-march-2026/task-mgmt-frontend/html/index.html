<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Shaala - Task Management</title>
    <script src="/js/script.js" defer></script>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="container">
        <h1>IT Shaala - Task Management</h1>
        <form id="taskForm">
            <input type="text" id="taskInput" placeholder="Enter a new task" required>
            <select id="prioritySelect" required>
                <option value="" disabled selected>Select priority</option>
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
            </select>
            <input type="date" id="dueDateInput" required>
            <button type="submit">Add Task</button>
        </form>
        <div class="filters">
            <button class="filter-button active" data-filter="all">All</button>
            <button class="filter-button" data-filter="pending">Pending</button>
            <button class="filter-button" data-filter="completed">Completed</button>
        </div>
        <ul id="taskList"></ul>
        <p id="taskCount">Tasks: 0</p>
    </div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
    <script src="/js/script.js" defer></script>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="container">
        <h1>Habit Tracker</h1>

        <div class="stats">

        </div>

        <div class="table-wrapper">
            <table id="habitTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Excercise for 15 minutes</th>
                        <th>Study for 30 minutes</th>
                        <th>Read for 20 minutes</th>
                        <th>Sleep for 8 hours</th>
                        <th>Drink 5 liters of water</th>
                        <th>Daily %</th>
                    </tr>
                </thead>
                <tbody id="habitBody">
                    <!-- Rows will be added dynamically -->
                </tbody>
            </table>
        </div>

        <button id="addRowBtn">Add Row</button>



    </div>
</body>

</html>
